syntax = "proto3";

package friends.v2;

import "google/protobuf/timestamp.proto";

message Comment {
  string contents = 2;
  google.protobuf.Timestamp last_changed = 3;
}

/* 3DS Mii */
message Mii {
  string name = 1;
  bool profanity_flag = 2;
  uint32 character_set = 3;
  bytes mii_data = 4;
  bytes mii_data_encrypted = 5;
}

message FriendMii {
  uint32 pid = 1;
  Mii mii = 2;
  google.protobuf.Timestamp modified_at = 3;
}

/* Wii U Mii */
message MiiV2 {
  string name = 1;
  bytes mii_data = 4;
  google.protobuf.Timestamp datetime = 5;
}

message PrincipalBasicInfo {
  uint32 pid = 1;
  string nnid = 2;
  MiiV2 mii = 3;
}

message NNAInfo {
  PrincipalBasicInfo principal_basic_info = 1;
}

message GameKey {
  uint64 title_id = 1;
  uint32 title_version = 2;
}

/* Wii U Presence */
message NintendoPresenceV2 {
  uint32 changed_flags = 1;
  bool online = 2;
  GameKey game_key = 3;
  string message = 5;
  uint32 game_server_id = 8;
  uint32 pid = 10;
  uint32 gathering_id = 11;
  bytes application_data = 12;
}

/* 3DS Presence */
message NintendoPresence {
  uint32 changed_flags = 1;
  GameKey game_key = 2;
  string message = 3;
  uint32 join_available_flag = 4;
  uint32 matchmake_type = 5;
  uint32 join_game_id = 6;
  uint32 join_game_mode = 7;
  uint32 owner_pid = 8;
  uint32 join_group_id = 9;
  bytes application_arg = 10;
}

message FriendInfoWiiU {
  NNAInfo nna_info = 1;
  NintendoPresenceV2 presence = 2;
  Comment status = 3;
  google.protobuf.Timestamp became_friend = 4;
  google.protobuf.Timestamp last_online = 5;
}

message FriendInfo3DS {
  uint32 pid = 1;
  uint32 region = 2;
  uint32 country = 3;
  uint32 area = 4;
  uint32 language = 5;
  uint32 platform = 6;
  NintendoPresence presence = 7;
  GameKey game_key = 8;
  string message = 9;
  google.protobuf.Timestamp message_updated_at = 10;
  google.protobuf.Timestamp mii_modified_at = 11;
  google.protobuf.Timestamp last_online = 12;
  FriendMii mii = 13;
}