syntax = "proto3";

package friends.v2;

import "friends/v2/friend_info.proto";

message GetUserFriendsDataRequest {
  uint32 pid = 1;
}

message GetUserFriendsDataWiiUResponse {
  repeated FriendInfoWiiU friends = 1;
}

message GetUserFriendsData3DSResponse {
  repeated FriendInfo3DS friends = 1;
}